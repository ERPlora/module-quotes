{% load djicons i18n %}

<!-- Standalone series add panel (used when loaded via side-sheet) -->
<div class="p-4">
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold">{% trans "New Series" %}</h3>
        <button class="btn btn-ghost btn-sm btn-circle" @click="closePanel()">
            {% icon "close-outline" %}
        </button>
    </div>

    <form hx-post="{% url 'quotes:series_add' %}"
          hx-target="#main-content-area"
          @htmx:after-request="if(event.detail.successful) closePanel()">
        {% csrf_token %}

        <div class="form-group mb-4">
            <label class="form-group-label">{% trans "Name" %} *</label>
            <input type="text" name="name" class="input" required
                   placeholder="{% trans 'e.g. Standard Quotes' %}">
        </div>

        <div class="form-group mb-4">
            <label class="form-group-label">{% trans "Prefix" %} *</label>
            <input type="text" name="prefix" class="input" required
                   placeholder="QT" maxlength="10" style="text-transform:uppercase">
        </div>

        <div class="form-group mb-4">
            <label class="form-group-label">{% trans "Number Digits" %}</label>
            <input type="number" name="number_digits" class="input" value="5" min="1" max="10">
        </div>

        <div class="flex items-center gap-6 mb-6">
            <label class="flex items-center gap-2">
                <label class="toggle color-success">
                    <input type="checkbox" name="is_active" checked>
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                <span class="text-sm">{% trans "Active" %}</span>
            </label>
            <label class="flex items-center gap-2">
                <label class="toggle color-primary">
                    <input type="checkbox" name="is_default">
                    <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                <span class="text-sm">{% trans "Default" %}</span>
            </label>
        </div>

        <div class="flex gap-2">
            <button type="button" class="btn btn-ghost flex-1" @click="closePanel()">
                {% trans "Cancel" %}
            </button>
            <button type="submit" class="btn color-primary flex-1">
                {% icon "save-outline" %}
                {% trans "Create" %}
            </button>
        </div>
    </form>
</div>
