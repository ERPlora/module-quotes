{% load djicons i18n %}

<div x-data="{ confirmDelete: false }">

<div class="side-sheet-header">
    <h3 class="sheet-title">{% trans "Edit Quote" %}</h3>
    <button class="sheet-close" @click="closePanel()">{% icon "close-outline" %}</button>
</div>

<div class="side-sheet-content">
    <form id="edit-quote-form"
          hx-post="{% url 'quotes:quote_edit' obj.id %}"
          hx-target="#datatable-body"
          hx-swap="innerHTML"
          @htmx:after-request="closePanel()"
          class="flex flex-col gap-4 p-6">
        {% csrf_token %}

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Quote Number" %}</label>
            <input type="text" name="quote_number" class="input input-sm w-full" value="{{ obj.quote_number }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Title" %}</label>
            <input type="text" name="title" class="input input-sm w-full" value="{{ obj.title }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Customer Name" %}</label>
            <input type="text" name="customer_name" class="input input-sm w-full" value="{{ obj.customer_name }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Customer Email" %}</label>
            <input type="email" name="customer_email" class="input input-sm w-full" value="{{ obj.customer_email }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Customer Phone" %}</label>
            <input type="text" name="customer_phone" class="input input-sm w-full" value="{{ obj.customer_phone }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Customer Address" %}</label>
            <textarea name="customer_address" class="textarea textarea-sm w-full" rows="3">{{ obj.customer_address }}</textarea>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Related Lead" %}</label>
            <input type="text" name="related_lead" class="input input-sm w-full" value="{{ obj.related_lead }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
            <select name="status" class="select select-sm w-full">
                <option value="">---</option>
            </select>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Notes" %}</label>
            <textarea name="notes" class="textarea textarea-sm w-full" rows="3">{{ obj.notes }}</textarea>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Terms & Conditions" %}</label>
            <textarea name="terms" class="textarea textarea-sm w-full" rows="3">{{ obj.terms }}</textarea>
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Subtotal" %}</label>
            <input type="number" name="subtotal" class="input input-sm w-full" step="0.01" value="{{ obj.subtotal }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Discount Amount" %}</label>
            <input type="number" name="discount_amount" class="input input-sm w-full" step="0.01" value="{{ obj.discount_amount }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Discount %" %}</label>
            <input type="number" name="discount_percent" class="input input-sm w-full" step="0.01" value="{{ obj.discount_percent }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Tax Amount" %}</label>
            <input type="number" name="tax_amount" class="input input-sm w-full" step="0.01" value="{{ obj.tax_amount }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Tax Rate %" %}</label>
            <input type="number" name="tax_rate" class="input input-sm w-full" step="0.01" value="{{ obj.tax_rate }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Total" %}</label>
            <input type="number" name="total" class="input input-sm w-full" step="0.01" value="{{ obj.total }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Valid Until" %}</label>
            <input type="date" name="valid_until" class="input input-sm w-full" value="{{ obj.valid_until }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Sent At" %}</label>
            <input type="datetime-local" name="sent_at" class="input input-sm w-full" value="{{ obj.sent_at }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Accepted At" %}</label>
            <input type="datetime-local" name="accepted_at" class="input input-sm w-full" value="{{ obj.accepted_at }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Rejected At" %}</label>
            <input type="datetime-local" name="rejected_at" class="input input-sm w-full" value="{{ obj.rejected_at }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Converted At" %}</label>
            <input type="datetime-local" name="converted_at" class="input input-sm w-full" value="{{ obj.converted_at }}">
        </div>

        <div>
            <label class="text-sm font-medium mb-1 block">{% trans "Rejection Reason" %}</label>
            <textarea name="rejection_reason" class="textarea textarea-sm w-full" rows="3">{{ obj.rejection_reason }}</textarea>
        </div>
    </form>

    <div class="border-t border-base-300 pt-4 mt-4 px-6 pb-6">
        <h4 class="font-semibold text-sm mb-3 text-error">{% trans "Danger Zone" %}</h4>
        <template x-if="!confirmDelete">
            <button type="button" class="btn btn-sm btn-outline color-error w-full" @click="confirmDelete = true">
                {% icon "trash-outline" %} {% trans "Delete" %}
            </button>
        </template>
        <template x-if="confirmDelete">
            <div>
                <p class="text-error text-sm font-semibold mb-3">{% trans "Are you sure?" %}</p>
                <div class="flex gap-2">
                    <button type="button" class="btn btn-sm btn-outline flex-1" @click="confirmDelete = false">{% trans "Cancel" %}</button>
                    <button type="button" class="btn btn-sm color-error flex-1"
                            hx-post="{% url 'quotes:quote_delete' obj.id %}"
                            hx-target="#datatable-body" hx-swap="innerHTML" @click="closePanel()">
                        {% icon "trash-outline" %} {% trans "Delete" %}
                    </button>
                </div>
            </div>
        </template>
    </div>
</div>

<div class="side-sheet-footer">
    <div class="flex justify-end gap-2">
        <button type="button" class="btn btn-ghost btn-sm" @click="closePanel()">{% trans "Cancel" %}</button>
        <button type="submit" form="edit-quote-form" class="btn btn-sm color-primary">
            {% icon "checkmark-outline" %} {% trans "Save" %}
        </button>
    </div>
</div>

</div>
