{% load djicons i18n %}
<div data-back-url="{% url 'quotes:list' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Add Quote Series" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'quotes:list' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="add-quote_series-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="add-quote_series-form"
          hx-post="{% url 'quotes:quote_series_add' %}">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Name" %}</label>
                <input type="text" name="name" class="input input-sm w-full" placeholder="{% trans 'Name' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Prefix" %}</label>
                <input type="text" name="prefix" class="input input-sm w-full" placeholder="{% trans 'Prefix' %}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Next Number" %}</label>
                <input type="number" name="next_number" class="input input-sm w-full"  placeholder="0">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Default Series" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_default">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Active" %}</label>
                <label class="toggle color-success">
                <input type="checkbox" name="is_active">
                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                </label>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Number Digits" %}</label>
                <input type="text" name="number_digits" class="input input-sm w-full" placeholder="{% trans 'Number Digits' %}">
                </div>
            </div>
        </div>
    </form>
</div>
